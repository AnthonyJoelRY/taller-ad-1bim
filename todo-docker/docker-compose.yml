services:
  postgres:
    image: postgres:16
    container_name: orm_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  mariadb:
    image: mariadb:11
    container_name: orm_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql

  pgadmin:
    image: dpage/pgadmin4
    container_name: orm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  phpmyadmin:
    image: phpmyadmin
    container_name: orm_phpmyadmin
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mariadb
